<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Allow pinch-zoom (do NOT re-add maximum-scale/user-scalable=no): blocking zoom is a
         WCAG failure for low-vision users. viewport-fit=cover keeps the safe-area insets. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Coven" />
    <meta name="description" content="Coven — a gathering place for the nocturnal." />

    <!-- Core fonts on the render path (shock-mode display faces lazy-load via SHOCK_FONT_HREF).
         Keep this URL in sync with CORE_FONT_HREF in src/styles/fonts.js. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Supabase is queried on first paint (session hydration) — preconnect so the
         DNS+TLS handshake overlaps with JS parse instead of serializing behind it. -->
    <link rel="preconnect" href="https://vrogmbvhdbporznqduyq.supabase.co" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600;700&family=Shippori+Mincho:wght@400;600&family=VT323&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" />

    <!-- Social preview (Open Graph + Twitter) so shared links show a branded card -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Coven" />
    <meta property="og:title" content="Coven" />
    <meta property="og:description" content="a gathering place for the nocturnal — goth, occult, 18+." />
    <meta property="og:url" content="https://project-tuihx.vercel.app/" />
    <meta property="og:image" content="https://project-tuihx.vercel.app/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Coven" />
    <meta name="twitter:description" content="a gathering place for the nocturnal — goth, occult, 18+." />
    <meta name="twitter:image" content="https://project-tuihx.vercel.app/og-cover.png" />

    <title>Coven</title>
  </head>
  <body class="bg-black">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
